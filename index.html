<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voxelcraft</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="glcanvas"></canvas>
  <div id="crosshair"></div>
  <div id="hotbar"></div>
  <div id="debug"></div>
  <div id="overlay">
    <div id="overlay-inner">
      <h1>VOXELCRAFT</h1>
      <p>Click to play</p>
      <table>
        <tr><td>Move</td><td>W A S D</td></tr>
        <tr><td>Jump / swim up</td><td>Space</td></tr>
        <tr><td>Sprint</td><td>Ctrl</td></tr>
        <tr><td>Break block</td><td>Left mouse</td></tr>
        <tr><td>Place block</td><td>Right mouse</td></tr>
        <tr><td>Pick block</td><td>Middle mouse</td></tr>
        <tr><td>Select block</td><td>1&ndash;9 / scroll</td></tr>
        <tr><td>Toggle fly</td><td>F &nbsp;(Space/Shift = up/down)</td></tr>
        <tr><td>Debug info</td><td>F3</td></tr>
        <tr><td>Release mouse</td><td>Esc</td></tr>
      </table>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
